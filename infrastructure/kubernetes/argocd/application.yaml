apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: curso-gitops
  namespace: argocd
spec:
  project: default

  source:
    # ⚠️ Cambiar TU_USUARIO_GITHUB por tu usuario real
    repoURL: https://github.com/TU_USUARIO_GITHUB/gitops-infra.git
    targetRevision: main
    path: infrastructure/kubernetes/app

  destination:
    server: https://kubernetes.default.svc
    namespace: curso-gitops

  syncPolicy:
    automated:
      # Eliminar recursos que ya no están en el repo
      prune: true
      # Revertir cambios manuales en el cluster (self-healing)
      selfHeal: true
    syncOptions:
      # Crear el namespace automáticamente si no existe
      - CreateNamespace=true
