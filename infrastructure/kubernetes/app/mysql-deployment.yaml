apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: curso-gitops
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          # Límites críticos para t2.micro (1GB RAM total)
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "r00t_S3cur3_P@ss!"
            - name: MYSQL_DATABASE
              value: "curso_db"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          ports:
            - containerPort: 3306
              name: mysql
          # Montar el script de inicialización
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          # Liveness probe — reinicia si MySQL no responde
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -u
                - root
                - -pr00t_S3cur3_P@ss!
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: init-script
          configMap:
            name: mysql-init-config
